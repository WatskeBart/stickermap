[project]
name = "stickermap"
version = "1.7.0"
description = "Sticker location mapper"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "datetime>=6.0",
    "exifread>=3.5.1",
    "fastapi>=0.135.3",
    "pillow>=12.2.0",
    "psycopg[binary]>=3.3.3",
    "python-dotenv>=1.2.2",
    "PyJWT>=2.12.1",
    "cryptography>=46.0.6",
    "python-multipart>=0.0.26",
    "requests>=2.33.1",
    "uvicorn[standard]>=0.44.0",
]

[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "pytest-asyncio>=0.24",
    "httpx>=0.28",
    "pytest-mock>=3.14",
]

[tool.uv]
constraint-dependencies = ["pygments>=2.20.0"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
asyncio_mode = "auto"

[tool.ruff]
ignore = ["F541"]

[tool.pyright]
reportOperatorIssue = "none"
