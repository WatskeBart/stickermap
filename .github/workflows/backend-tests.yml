# .github/workflows/backend-tests.yml
#
# Runs the backend test suite on every pull request.
# No database or Keycloak instance is required — all external
# dependencies are mocked by the test suite itself.

name: Backend Tests

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Install dependencies (incl. dev group)
        working-directory: backend
        run: uv sync --group dev

      - name: Run tests
        working-directory: backend
        run: uv run pytest -v
