# .github/workflows/publish-helm-pages.yml
#
# Packages the StickerMap Helm chart, adds it to the gh-pages Helm repository,
# and regenerates index.yaml so consumers can install via:
#
#   helm repo add stickermap https://watskebart.github.io/stickermap
#
# Triggers:
#   - push of semver tag  → publishes chart version matching the tag

name: Publish Helm Chart to GitHub Pages

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write

jobs:
  publish:
    name: Package & publish Helm chart to gh-pages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Determine chart version from tag
        id: tag
        run: echo "value=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Update Chart.yaml version to match tag
        run: |
          sed -i "s/^version:.*/version: ${{ steps.tag.outputs.value }}/" helm/stickermap/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${{ steps.tag.outputs.value }}\"/" helm/stickermap/Chart.yaml

      - name: Package Helm chart
        run: helm package helm/stickermap --version ${{ steps.tag.outputs.value }} --app-version ${{ steps.tag.outputs.value }}

      - name: Checkout gh-pages branch
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: gh-pages

      - name: Move packaged chart into gh-pages
        run: mv stickermap-${{ steps.tag.outputs.value }}.tgz gh-pages/

      - name: Regenerate Helm repo index
        run: |
          MERGE_FLAG=""
          if [ -f gh-pages/index.yaml ]; then
            MERGE_FLAG="--merge gh-pages/index.yaml"
          fi
          helm repo index gh-pages \
            --url https://watskebart.github.io/stickermap \
            $MERGE_FLAG

      - name: Commit and push updated index to gh-pages
        run: |
          cd gh-pages
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.yaml stickermap-${{ steps.tag.outputs.value }}.tgz
          git commit -m "chore: publish stickermap chart ${{ steps.tag.outputs.value }}"
          git push
