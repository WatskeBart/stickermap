# .github/workflows/build-images.yml
#
# Builds and pushes Docker images for the StickerMap monorepo to GHCR.
# Uses docker/build-push-action (buildx) — well-tested against GHCR.
#
# Triggers:
#   - push to 'develop' branch  → tag: develop
#   - push to 'main' branch     → tag: main
#   - push of semver tag        → tag: <tag-name> (e.g. 1.0.0)
#
# No other branch pushes trigger this workflow.

name: Build & Push Images

on:
  push:
    branches:
      - main
      - develop
    tags:
      - '[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      # Do not cancel sibling matrix jobs if one fails.
      fail-fast: false
      matrix:
        include:
          - service: frontend
            context: ./frontend
            dockerfile: frontend/Dockerfile
          - service: backend
            context: ./backend
            dockerfile: backend/Dockerfile
          - service: database_migrations
            context: ./database_migrations
            dockerfile: database_migrations/Dockerfile

    steps:
      - name: Make repository owner lowercase
        run: echo "REPO=${GITHUB_REPOSITORY@L}" >> "${GITHUB_ENV}"

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Image tag derivation ─────────────────────────────────────────────────
      # Strip the ref prefix to get the bare branch name or tag name:
      #   refs/heads/develop → develop
      #   refs/heads/main    → main
      #   refs/tags/1.0.0   → 1.0.0
      - name: Determine image tag
        id: tag
        run: |
          if [[ "$GITHUB_REF" == refs/heads/* ]]; then
            echo "value=${GITHUB_REF#refs/heads/}" >> $GITHUB_OUTPUT
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "value=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
            echo "add_latest=true" >> $GITHUB_OUTPUT
          fi
          
      # ── Build & Push ──────────────────────────────────────────────────────────
      # Builds and pushes the image to GHCR in a single step.
      #
      # Caching strategy:
      #   cache-from / cache-to use the buildx OCI registry cache format.
      #   A single shared cache image (stickermap-cache) is used for all services,
      #   with per-service tags so each matrix job has its own cache manifest.
      #   Shared base layers (e.g. node:alpine, caddy:alpine) are still reused
      #   across services because blobs are content-addressed in the registry.
      #   mode=max caches all intermediate build stages (important for multi-stage
      #   Dockerfiles like the frontend's node builder + Caddy final stage).
      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ env.REPO }}/stickermap-${{ matrix.service }}:${{ steps.tag.outputs.value }}
            ${{ steps.tag.outputs.add_latest == 'true' && format('ghcr.io/{0}/stickermap-{1}:latest', env.REPO, matrix.service) || '' }}
          cache-from: type=registry,ref=ghcr.io/${{ env.REPO }}-cache:${{ matrix.service }}
          cache-to: type=registry,ref=ghcr.io/${{ env.REPO }}-cache:${{ matrix.service }},mode=max
