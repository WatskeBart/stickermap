---
# Admin credentials
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-keycloak-admin
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  admin-username: {{ .Values.adminUsername | quote }}
  admin-password: {{ required "keycloak.adminPassword is required" .Values.adminPassword | quote }}
---
# Database password (referenced by CNPG managed role — key MUST be "password").
# Also referenced by the standalone StatefulSet init script.
{{- $dbSecretName := printf "%s-keycloak-db" .Release.Name }}
{{- $existingDbSecret := lookup "v1" "Secret" .Release.Namespace $dbSecretName }}
{{- $dbPassword := "" }}
{{- if $existingDbSecret }}
  {{- $dbPassword = index $existingDbSecret.data "password" | b64dec }}
{{- else if .Values.dbPassword }}
  {{- $dbPassword = .Values.dbPassword }}
{{- else }}
  {{- $dbPassword = randAlphaNum 32 }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $dbSecretName }}
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  password: {{ $dbPassword | quote }}
