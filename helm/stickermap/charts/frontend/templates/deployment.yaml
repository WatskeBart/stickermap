apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-frontend
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frontend
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      securityContext:
        runAsNonRoot: true
        # Caddy alpine runs as user 1000 (caddy)
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      initContainers:
        # ngssc injects runtime environment variables into the Angular build output.
        # It must run in a writable copy of /var/www/html (the image's html dir is
        # part of the read-only root filesystem). We copy the files to an emptyDir,
        # run ngssc there, and the main Caddy container serves from that emptyDir.
        - name: ngssc
          image: "{{ required "frontend.image.repository is required" .Values.image.repository }}:{{ required "frontend.image.tag is required" .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              cp -r /var/www/html/. /mnt/html/ && ngssc insert /mnt/html
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          env:
            - name: KEYCLOAK_URL
              value: "https://{{ required "global.hostname is required" .Values.global.hostname }}"
            - name: KEYCLOAK_REALM
              value: "stickermap"
            - name: KEYCLOAK_CLIENT_ID
              value: "stickermap-client"
            {{- if .Values.tileserverUrl }}
            - name: TILESERVER_URL
              value: {{ .Values.tileserverUrl | quote }}
            {{- end }}
          volumeMounts:
            - name: html
              mountPath: /mnt/html
            - name: tmp
              mountPath: /tmp
      containers:
        - name: frontend
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # Override the default entrypoint (which runs ngssc + caddy).
          # ngssc already ran in the init container; just start Caddy directly.
          command:
            - caddy
            - run
            - --config
            - /etc/caddy/Caddyfile
            - --adapter
            - caddyfile
          ports:
            - name: http
              containerPort: 8282
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            # Processed HTML from the ngssc init container
            - name: html
              mountPath: /var/www/html
            # Override Caddyfile with the k8s-specific version (HTTP only, no proxy)
            - name: caddy-config
              mountPath: /etc/caddy/Caddyfile
              subPath: Caddyfile
            # Caddy state directory (cert storage etc.)
            - name: caddy-data
              mountPath: /data
            # Caddy runtime config
            - name: caddy-runtime-config
              mountPath: /config
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            httpGet:
              path: /
              port: 8282
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: 8282
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        # Shared between init container (write) and main container (read)
        - name: html
          emptyDir: {}
        # ConfigMap-provided Caddyfile (read-only mount, compatible with readOnlyRootFilesystem)
        - name: caddy-config
          configMap:
            name: {{ .Release.Name }}-frontend-caddy
        - name: caddy-data
          emptyDir: {}
        - name: caddy-runtime-config
          emptyDir: {}
        - name: tmp
          emptyDir: {}
