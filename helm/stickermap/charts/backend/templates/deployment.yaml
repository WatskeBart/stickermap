apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-backend
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: backend
          image: "{{ required "backend.image.repository is required" .Values.image.repository }}:{{ required "backend.image.tag is required" .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 5555
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          env:
            # Database — secret name is the same for both cnpg and standalone modes.
            # CNPG generates it automatically; standalone creates it in the database sub-chart.
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-db-stickermap
                  key: host
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-db-stickermap
                  key: port
            - name: DB_DBNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-db-stickermap
                  key: dbname
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-db-stickermap
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-db-stickermap
                  key: password
            # Keycloak
            {{- $keycloakUrl := .Values.keycloakUrl }}
            {{- if not $keycloakUrl }}
              {{- if .Values.global.keycloak.enabled }}
                {{- $keycloakUrl = printf "https://%s" (required "global.hostname is required" .Values.global.hostname) }}
              {{- else }}
                {{- $keycloakUrl = required "backend.keycloakUrl is required when global.keycloak.enabled is false" "" }}
              {{- end }}
            {{- end }}
            {{- $keycloakInternalUrl := .Values.keycloakInternalUrl }}
            {{- if not $keycloakInternalUrl }}
              {{- if .Values.global.keycloak.enabled }}
                {{- $keycloakInternalUrl = printf "http://%s-keycloak:8080" .Release.Name }}
              {{- else }}
                {{- $keycloakInternalUrl = $keycloakUrl }}
              {{- end }}
            {{- end }}
            - name: KEYCLOAK_URL
              value: {{ $keycloakUrl | quote }}
            - name: KEYCLOAK_INTERNAL_URL
              value: {{ $keycloakInternalUrl | quote }}
            - name: KEYCLOAK_REALM
              value: {{ .Values.keycloakRealm | quote }}
            - name: KEYCLOAK_CLIENT_ID
              value: {{ .Values.keycloakClientId | quote }}
            - name: KEYCLOAK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-backend
                  key: keycloak-client-secret
            # Application
            - name: UPLOAD_DIR
              value: "/app/uploads"
            - name: LOG_LEVEL
              value: {{ .Values.env.logLevel | quote }}
            - name: INIT_NEW_DATABASE
              value: {{ .Values.env.initNewDatabase | quote }}
            - name: CORS_ALLOWED_ORIGINS
              value: {{ .Values.env.corsAllowedOrigins | quote }}
            - name: CORS_ALLOWED_METHODS
              value: {{ .Values.env.corsAllowedMethods | quote }}
            - name: CORS_ALLOWED_HEADERS
              value: {{ .Values.env.corsAllowedHeaders | quote }}
            - name: CORS_ALLOW_CREDENTIALS
              value: {{ .Values.env.corsAllowCredentials | quote }}
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            httpGet:
              path: /api/v1/
              port: 5555
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /api/v1/
              port: 5555
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-backend-uploads
        - name: tmp
          emptyDir: {}
