# Default values — overridden by the umbrella chart's values.yaml

# Inherited from global.database.type in the umbrella chart.
# Set here as a fallback for standalone sub-chart use.
type: cnpg

cnpg:
  imageName: ghcr.io/cloudnative-pg/postgis:18-3.6-standard-trixie
  instances: 1
  storage:
    size: 5Gi
    storageClassName: ""

standalone:
  image:
    repository: docker.io/postgis/postgis
    tag: "18-3.6"
    pullPolicy: IfNotPresent
  storage:
    size: 5Gi
    storageClassName: ""
  appPassword: ""
  resources: {}
