{{- $dbType := default .Values.type .Values.global.database.type -}}
{{- if eq $dbType "standalone" }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-database-init
  labels:
    app.kubernetes.io/name: database
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  init.sh: |
    #!/bin/bash
    set -e

    # Create the stickermap application user and database
    psql -v ON_ERROR_STOP=1 -U "$POSTGRES_USER" -d "$POSTGRES_DB" \
      -c "CREATE USER stickermap WITH PASSWORD '${STICKERMAP_PASSWORD}';" \
      -c "CREATE DATABASE stickermap OWNER stickermap;"

    # Enable PostGIS in the stickermap database
    psql -v ON_ERROR_STOP=1 -U "$POSTGRES_USER" -d "stickermap" \
      -c "CREATE EXTENSION IF NOT EXISTS postgis;" \
      -c "CREATE EXTENSION IF NOT EXISTS postgis_topology;"
    {{- if .Values.global.keycloak.enabled }}

    # Create the keycloak user and database
    psql -v ON_ERROR_STOP=1 -U "$POSTGRES_USER" -d "$POSTGRES_DB" \
      -c "CREATE USER keycloak WITH PASSWORD '${KEYCLOAK_PASSWORD}';" \
      -c "CREATE DATABASE keycloak OWNER keycloak;"
    {{- end }}
{{- end }}
