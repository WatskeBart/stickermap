{{- if eq .Values.type "cnpg" }}
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ .Release.Name }}-db
  labels:
    app.kubernetes.io/name: database
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  imageName: {{ .Values.cnpg.imageName }}
  instances: {{ .Values.cnpg.instances }}

  bootstrap:
    initdb:
      # Primary application database with PostGIS extensions enabled
      database: stickermap
      owner: stickermap
      postInitApplicationSQL:
        - CREATE EXTENSION IF NOT EXISTS postgis;
        - CREATE EXTENSION IF NOT EXISTS postgis_topology;

  # CNPG managed databases and roles — the operator creates/maintains these
  # automatically and syncs passwords from the referenced secrets.
  managed:
    databases:
      - name: keycloak
        owner: keycloak
    roles:
      - name: keycloak
        login: true
        # CNPG reads the password from key "password" in this secret.
        # The secret is created by the keycloak sub-chart.
        passwordSecret:
          name: {{ .Release.Name }}-keycloak-db

  storage:
    size: {{ .Values.cnpg.storage.size }}
    {{- if .Values.cnpg.storage.storageClassName }}
    storageClassName: {{ .Values.cnpg.storage.storageClassName }}
    {{- end }}
{{- end }}
