{{- $dbType := default .Values.type .Values.global.database.type -}}
{{- if eq $dbType "standalone" }}
{{- $secretName := printf "%s-db-stickermap" .Release.Name }}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $password := "" }}
{{- if $existingSecret }}
  {{- $password = index $existingSecret.data "password" | b64dec }}
{{- else if .Values.standalone.appPassword }}
  {{- $password = .Values.standalone.appPassword }}
{{- else }}
  {{- $password = randAlphaNum 32 }}
{{- end }}
---
# Application database credentials — mirrors the CNPG-generated secret format so
# the backend deployment template works identically in both database modes.
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    app.kubernetes.io/name: database
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  host: {{ .Release.Name }}-database
  port: "5432"
  dbname: stickermap
  username: stickermap
  password: {{ $password | quote }}
---
{{- $superSecretName := printf "%s-database-superuser" .Release.Name }}
{{- $existingSuperSecret := lookup "v1" "Secret" .Release.Namespace $superSecretName }}
{{- $superPassword := "" }}
{{- if $existingSuperSecret }}
  {{- $superPassword = index $existingSuperSecret.data "password" | b64dec }}
{{- else }}
  {{- $superPassword = randAlphaNum 32 }}
{{- end }}
# Superuser credentials used by the PostgreSQL pod itself (POSTGRES_PASSWORD).
apiVersion: v1
kind: Secret
metadata:
  name: {{ $superSecretName }}
  labels:
    app.kubernetes.io/name: database
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  password: {{ $superPassword | quote }}
{{- end }}
