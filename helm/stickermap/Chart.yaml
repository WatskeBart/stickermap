apiVersion: v2
name: stickermap
description: StickerMap - an umbrella chart deploying backend, frontend, and a database (CNPG or standalone). Keycloak is optional.
type: application
version: 0.1.0
appVersion: "1.6.0"
icon: data:image/svg+xml;base64,

# All dependencies use file:// references to local sub-charts — no external chart repositories are required.
# Run 'helm dependency build helm/stickermap' once before installing to package the sub-charts (reads only local files, no internet access needed).
dependencies:
  - name: backend
    version: "0.1.0"
    repository: "file://charts/backend"
  - name: frontend
    version: "0.1.0"
    repository: "file://charts/frontend"
  - name: keycloak
    version: "0.1.0"
    repository: "file://charts/keycloak"
    condition: global.keycloak.enabled
  - name: database
    version: "0.1.0"
    repository: "file://charts/database"
