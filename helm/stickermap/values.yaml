# ==============================================================================
# StickerMap Helm Values
# ==============================================================================
# Mandatory values are marked with # REQUIRED — the chart will not work without
# them. All other values have sensible defaults.

# ------------------------------------------------------------------------------
# Backend
# ------------------------------------------------------------------------------
backend:
  image:
    repository: ghcr.io/watskebart/stickermap/stickermap-backend
    tag: latest
    pullPolicy: Always
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 512Mi

  migrations:
    image:
      repository: ghcr.io/watskebart/stickermap/stickermap-database_migrations
      tag: latest
      pullPolicy: Always
    resources:
      requests:
        cpu: 50m
        memory: 32Mi
      limits:
        memory: 512Mi

  replicaCount: 1

  uploads:
    storage:
      size: 10Gi
      # ReadWriteMany is required when replicaCount > 1
      accessMode: ReadWriteOnce
      # Set to a specific StorageClass name if needed; leave empty for cluster default
      storageClassName: ""

  env:
    logLevel: "INFO"
    # Defaults to https://<ingress.hostname> when empty.
    # Set explicitly if the frontend is served from a different origin.
    corsAllowedOrigins: ""
    corsAllowedMethods: "GET, POST, PUT, DELETE, OPTIONS"
    corsAllowedHeaders: "Content-Type, Authorization"
    corsAllowCredentials: "true"
    imageFormat: "JPEG"
    imageQuality: "85"
    imageMaxSize: "1920"
    thumbnailSize: "400"

# ------------------------------------------------------------------------------
# Frontend
# ------------------------------------------------------------------------------
frontend:
  image:
    repository: ghcr.io/watskebart/stickermap/stickermap-frontend
    tag: latest
    pullPolicy: Always
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      memory: 128Mi

  replicaCount: 1

  publicUrl: ":8181"

  # Internal backend URL Caddy uses to proxy /api and /uploads.
  # Defaults to http://<release>-backend:5555 when empty.
  backendUrl: "backend-service.stickermap.svc.cluster.local:5555"

  # Passed to ngssc as PRODUCTION; controls Angular production mode flag.
  production: "true"

  # Tile layer URLs — one per map type. The map's tile-type toggle is built from
  # whichever of these are set; if only one is configured the toggle is hidden.
  # The street layer falls back to the bundled OpenStreetMap URL when left empty.
  tileLayers:
    street: https://tile.openstreetmap.org/{z}/{x}/{y}.png
    satellite: https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}
    terrain: https://server.arcgisonline.com/ArcGIS/rest/services/World_Shaded_Relief/MapServer/tile/{z}/{y}/{x}

# ------------------------------------------------------------------------------
# Keycloak (external)
# ------------------------------------------------------------------------------
keycloak:
  # REQUIRED: Public URL the browser uses to reach Keycloak, e.g. https://auth.example.com
  url: "https://auth.example.com"
  # Internal URL (e.g. keycloak service) for backend JWKS/token validation. Falls back to url when empty.
  internalUrl: "keycloak-service.keycloak.svc.cluster.local:8080"
  realm: "stickermap"
  clientId: "stickermap-client"

# ------------------------------------------------------------------------------
# Ingress
# ------------------------------------------------------------------------------
ingress:
  # REQUIRED: External hostname, e.g. stickermap.example.com
  hostname: "stickermap.example.com"
  className: traefik
  annotations: {}
    # cert-manager.io/cluster-issuer: stepca
  tls:
  - secretName: stickermap-tls
    hosts:
    - stickermap.example.com

# ------------------------------------------------------------------------------
# Database credentials
# ------------------------------------------------------------------------------
database:
  # Name of a pre-existing Kubernetes Secret containing DB credentials (e.g. CNPG cluster-example-app).
  # Required keys: host, port, dbname, username, password.
  # When set, the chart references this secret directly and ignores the fields below.
  existingSecretName: "cluster-example-app"

  # Used only when existingSecretName is empty.
  # The chart creates a Secret named <release>-db-stickermap from these values.
  host: "cluster-example-rw"      # REQUIRED when existingSecretName is empty
  port: "5432"
  dbname: "stickermap"
  username: "stickermap"
  password: "changeme"  # REQUIRED when existingSecretName is empty
