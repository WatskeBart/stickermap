apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-backend
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  keycloak-client-secret: {{ required "backend.keycloakClientSecret is required" .Values.backend.keycloakClientSecret | quote }}
