{{- if not .Values.database.existingSecretName }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-db-stickermap
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  host: {{ required "database.host is required when database.existingSecretName is not set" .Values.database.host | quote }}
  port: {{ .Values.database.port | quote }}
  dbname: {{ .Values.database.dbname | quote }}
  username: {{ .Values.database.username | quote }}
  password: {{ required "database.password is required when database.existingSecretName is not set" .Values.database.password | quote }}
{{- end }}
