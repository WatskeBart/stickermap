apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-backend-uploads
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  accessModes:
    - {{ .Values.backend.uploads.storage.accessMode }}
  resources:
    requests:
      storage: {{ .Values.backend.uploads.storage.size }}
  {{- if .Values.backend.uploads.storage.storageClassName }}
  storageClassName: {{ .Values.backend.uploads.storage.storageClassName }}
  {{- end }}
