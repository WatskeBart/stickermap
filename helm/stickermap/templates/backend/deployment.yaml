apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-backend
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: backend
          image: "{{ required "backend.image.repository is required" .Values.backend.image.repository }}:{{ required "backend.image.tag is required" .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 5555
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          env:
            # Database
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ include "stickermap.dbSecretName" . }}
                  key: host
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: {{ include "stickermap.dbSecretName" . }}
                  key: port
            - name: DB_DBNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "stickermap.dbSecretName" . }}
                  key: dbname
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "stickermap.dbSecretName" . }}
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "stickermap.dbSecretName" . }}
                  key: password
            # Keycloak
            {{- $keycloakUrl := required "keycloak.url is required" .Values.keycloak.url }}
            {{- $keycloakInternalUrl := .Values.keycloak.internalUrl | default $keycloakUrl }}
            - name: KEYCLOAK_URL
              value: {{ $keycloakUrl | quote }}
            - name: KEYCLOAK_INTERNAL_URL
              value: {{ $keycloakInternalUrl | quote }}
            - name: KEYCLOAK_REALM
              value: {{ .Values.keycloak.realm | quote }}
            - name: KEYCLOAK_CLIENT_ID
              value: {{ .Values.keycloak.clientId | quote }}
            # Application
            - name: UPLOAD_DIR
              value: "/app/uploads"
            - name: LOG_LEVEL
              value: {{ .Values.backend.env.logLevel | quote }}
            - name: CORS_ALLOWED_ORIGINS
              value: {{ .Values.backend.env.corsAllowedOrigins | default (printf "https://%s" (required "ingress.hostname is required" .Values.ingress.hostname)) | quote }}
            - name: CORS_ALLOWED_METHODS
              value: {{ .Values.backend.env.corsAllowedMethods | quote }}
            - name: CORS_ALLOWED_HEADERS
              value: {{ .Values.backend.env.corsAllowedHeaders | quote }}
            - name: CORS_ALLOW_CREDENTIALS
              value: {{ .Values.backend.env.corsAllowCredentials | quote }}
            - name: IMAGE_FORMAT
              value: {{ .Values.backend.env.imageFormat | quote }}
            - name: IMAGE_QUALITY
              value: {{ .Values.backend.env.imageQuality | quote }}
            - name: IMAGE_MAX_SIZE
              value: {{ .Values.backend.env.imageMaxSize | quote }}
            - name: THUMBNAIL_SIZE
              value: {{ .Values.backend.env.thumbnailSize | quote }}
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            httpGet:
              path: /api/v1/
              port: 5555
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /api/v1/
              port: 5555
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- with .Values.backend.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-backend-uploads
        - name: tmp
          emptyDir: {}
