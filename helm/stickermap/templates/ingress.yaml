apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}
  labels:
    app.kubernetes.io/name: stickermap
    app.kubernetes.io/instance: {{ .Release.Name }}
  {{- $annotations := dict }}
  {{- if .Values.ingress.httpRedirect }}
  {{- $_ := set $annotations "traefik.ingress.kubernetes.io/router.middlewares" (printf "%s-%s-https-redirect@kubernetescrd" .Release.Namespace .Release.Name) }}
  {{- end }}
  {{- with .Values.ingress.annotations }}
  {{- $annotations = merge $annotations . }}
  {{- end }}
  {{- if $annotations }}
  annotations:
    {{- toYaml $annotations | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- toYaml .Values.ingress.tls | nindent 4 }}
  {{- end }}
  rules:
    - host: {{ required "ingress.hostname is required" .Values.ingress.hostname }}
      http:
        paths:
          # Backend API
          - path: /api/v1
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-backend
                port:
                  number: 5555
          # Backend static uploads
          - path: /uploads
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-backend
                port:
                  number: 5555
          # Frontend SPA (catch-all — must be last)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-frontend
                port:
                  number: 8181
