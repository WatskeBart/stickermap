apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-frontend
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frontend
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 11953
        runAsGroup: 11953
        fsGroup: 11953
      containers:
        - name: frontend
          image: "{{ required "frontend.image.repository is required" .Values.frontend.image.repository }}:{{ required "frontend.image.tag is required" .Values.frontend.image.tag }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8181
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
              add:
                - NET_BIND_SERVICE
          env:
            {{- $frontendKeycloakUrl := .Values.frontend.keycloakUrl }}
            {{- if not $frontendKeycloakUrl }}
              {{- if .Values.keycloak.enabled }}
                {{- $frontendKeycloakUrl = printf "https://%s" (required "global.hostname is required" .Values.global.hostname) }}
              {{- else }}
                {{- $frontendKeycloakUrl = required "frontend.keycloakUrl or backend.keycloakUrl is required when keycloak.enabled is false" .Values.backend.keycloakUrl }}
              {{- end }}
            {{- end }}
            {{- $frontendKeycloakInternalUrl := .Values.backend.keycloakInternalUrl }}
            {{- if not $frontendKeycloakInternalUrl }}
              {{- if .Values.keycloak.enabled }}
                {{- $frontendKeycloakInternalUrl = printf "http://%s-keycloak:8080" .Release.Name }}
              {{- else }}
                {{- $frontendKeycloakInternalUrl = $frontendKeycloakUrl }}
              {{- end }}
            {{- end }}
            - name: PUBLIC_URL
              value: {{ .Values.frontend.publicUrl | quote }}
            - name: BACKEND_URL
              value: {{ .Values.frontend.backendUrl | default (printf "http://%s-backend:5555" .Release.Name) | quote }}
            - name: KEYCLOAK_URL
              value: {{ $frontendKeycloakUrl | quote }}
            - name: KEYCLOAK_INTERNAL_URL
              value: {{ $frontendKeycloakInternalUrl | quote }}
            - name: KEYCLOAK_REALM
              value: {{ .Values.backend.keycloakRealm | quote }}
            - name: KEYCLOAK_CLIENT_ID
              value: {{ .Values.backend.keycloakClientId | quote }}
            - name: PRODUCTION
              value: {{ .Values.frontend.production | quote }}
            {{- if .Values.frontend.tileserverUrl }}
            - name: TILESERVER_URL
              value: {{ .Values.frontend.tileserverUrl | quote }}
            {{- end }}
          volumeMounts:
            - name: caddy-srv
              mountPath: /srv
            - name: caddy-data
              mountPath: /data
            - name: caddy-config
              mountPath: /config
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            httpGet:
              path: /
              port: 8181
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: 8181
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- with .Values.frontend.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: caddy-srv
          emptyDir: {}
        - name: caddy-data
          emptyDir: {}
        - name: caddy-config
          emptyDir: {}
        - name: tmp
          emptyDir: {}
