{{- if .Values.keycloak.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-keycloak
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.keycloak.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: keycloak
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: keycloak
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      securityContext:
        runAsNonRoot: true
        # Keycloak official image runs as uid 1000
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      initContainers:
        # The realm ConfigMap is read-only; Keycloak needs to read the import
        # file from a writable directory. This init container copies the realm
        # JSON from the ConfigMap into the shared emptyDir that Keycloak uses
        # as its data directory.
        - name: realm-import-setup
          image: "{{ .Values.keycloak.image.repository }}:{{ .Values.keycloak.image.tag }}"
          imagePullPolicy: {{ .Values.keycloak.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              mkdir -p /opt/keycloak/data/import && \
              cp /tmp/realm/stickermap-realm.json /opt/keycloak/data/import/stickermap-realm.json
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: realm-config
              mountPath: /tmp/realm
            - name: keycloak-data
              mountPath: /opt/keycloak/data
            - name: tmp
              mountPath: /tmp
      containers:
        - name: keycloak
          image: "{{ .Values.keycloak.image.repository }}:{{ .Values.keycloak.image.tag }}"
          imagePullPolicy: {{ .Values.keycloak.image.pullPolicy }}
          args:
            - start
            - --import-realm
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          env:
            # Database
            - name: KC_DB
              value: postgres
            - name: KC_DB_URL
              {{- if eq .Values.database.mode "standalone" }}
              value: "jdbc:postgresql://{{ .Release.Name }}-database:5432/keycloak"
              {{- else }}
              value: "jdbc:postgresql://{{ .Release.Name }}-db-rw/keycloak"
              {{- end }}
            - name: KC_DB_USERNAME
              value: keycloak
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-keycloak-db
                  key: password
            # Hostname & proxy
            # KC_HOSTNAME must match the external hostname so token issuers are correct.
            - name: KC_HOSTNAME
              value: {{ required "global.hostname is required" .Values.global.hostname | quote }}
            # Tell Keycloak it's behind a reverse proxy that handles TLS.
            - name: KC_PROXY_HEADERS
              value: xforwarded
            # Serve plain HTTP inside the cluster (TLS is terminated at the Ingress).
            - name: KC_HTTP_ENABLED
              value: "true"
            # Disable Keycloak's own HTTPS redirect (the Ingress/CDN handles that).
            - name: KC_HOSTNAME_STRICT_HTTPS
              value: "false"
            # Admin credentials
            - name: KEYCLOAK_ADMIN
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-keycloak-admin
                  key: admin-username
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-keycloak-admin
                  key: admin-password
          volumeMounts:
            - name: keycloak-data
              mountPath: /opt/keycloak/data
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            httpGet:
              path: /realms/master
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /realms/master
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 10
          {{- with .Values.keycloak.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        # ConfigMap containing stickermap-realm.json (read-only)
        - name: realm-config
          configMap:
            name: {{ .Release.Name }}-keycloak-realm
        # Shared data directory — init container populates import/, main container uses it
        - name: keycloak-data
          emptyDir: {}
        - name: tmp
          emptyDir: {}
{{- end }}
