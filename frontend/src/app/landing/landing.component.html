<div class="landing-container">
  <video autoplay [muted]="true" loop playsinline class="background-video">
    <source src="/images/bg-clouds.webm" type="video/webm" />
  </video>

  <div class="landing-content">
    <div class="action-cards">
      <mat-card class="action-card" (click)="navigateToMap()">
        <mat-card-content>
          <div class="card-icon">🗺️</div>
          <p>Bekijk alle sticker locaties</p>
        </mat-card-content>
        <mat-card-actions>
          <button mat-flat-button color="accent" (click)="navigateToMap(); $event.stopPropagation()">
            Bekijk Kaart
          </button>
        </mat-card-actions>
      </mat-card>

      @if (authService.isUploader()) {
        <mat-card class="action-card" (click)="navigateToAddSticker()">
          <mat-card-content>
            <div class="card-icon">📍</div>
            <p>Nieuwe sticker toevoegen aan de kaart</p>
          </mat-card-content>
          <mat-card-actions>
            <button mat-flat-button color="accent" (click)="navigateToAddSticker(); $event.stopPropagation()">
              Sticker Toevoegen
            </button>
          </mat-card-actions>
        </mat-card>
      }
    </div>
  </div>
</div>
