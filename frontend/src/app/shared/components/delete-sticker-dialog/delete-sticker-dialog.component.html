<h2 mat-dialog-title>{{ 'deleteDialog.title' | translate }}</h2>
<mat-dialog-content>
  <p>{{ 'deleteDialog.body' | translate }}</p>
  <p><strong>{{ data.poster }}</strong></p>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()" [disabled]="deleting()">{{ 'common.cancel' | translate }}</button>
  <button mat-flat-button color="warn" (click)="confirmDelete()" [disabled]="deleting()">
    {{ (deleting() ? 'deleteDialog.deleting' : 'deleteDialog.confirm') | translate }}
  </button>
</mat-dialog-actions>
