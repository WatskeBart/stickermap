<h2 mat-dialog-title>{{ 'reportRemoval.title' | translate }}</h2>

<mat-dialog-content>
  <p [innerHTML]="'reportRemoval.body' | translate: { poster: data.poster }"></p>

  <div class="proof-section">
    <button mat-stroked-button type="button" (click)="fileInput.click()" [disabled]="submitting()">
      <mat-icon>attach_file</mat-icon>
      @if (proofFile()) {
        {{ proofFile()!.name }}
      } @else {
        {{ 'reportRemoval.addProof' | translate }}
      }
    </button>
    <input
      #fileInput
      type="file"
      accept="image/jpeg,image/png,image/gif,image/webp"
      style="display: none"
      (change)="onFileSelected($event)"
    />
    @if (proofFile()) {
      <button mat-icon-button type="button" (click)="clearFile()" [disabled]="submitting()" [attr.aria-label]="'reportRemoval.removePhotoAria' | translate">
        <mat-icon>close</mat-icon>
      </button>
    }
  </div>

  @if (errorMessage()) {
    <p class="error-message">{{ errorMessage() }}</p>
  }
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button [mat-dialog-close]="{ reported: false }" [disabled]="submitting()">{{ 'common.cancel' | translate }}</button>
  <button mat-flat-button color="warn" (click)="submit()" [disabled]="submitting()">
    @if (submitting()) {
      <mat-progress-spinner mode="indeterminate" diameter="18" />
    } @else {
      {{ 'reportRemoval.submit' | translate }}
    }
  </button>
</mat-dialog-actions>
