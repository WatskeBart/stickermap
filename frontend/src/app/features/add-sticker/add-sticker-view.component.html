<div class="add-sticker-container">
  <div class="content-wrapper">
    <!-- Form Section -->
    <div class="form-section" [class.hidden]="locationSelectionMode() || previewOnlyMode()">
      <app-sticker-form
        (stickerCreated)="onStickerCreated()"
        (locationSelectionRequested)="onLocationSelectionRequested()"
        (previewLocationRequested)="onPreviewLocationRequested($event)"
      ></app-sticker-form>
    </div>

    <!-- Location Selection / Preview Map -->
    <div class="map-section" [class.visible]="locationSelectionMode() || previewOnlyMode()">
      <mat-toolbar color="primary" class="map-overlay-header">
        @if (locationSelectionMode()) {
          <span>{{ 'addSticker.clickToPlace' | translate }}</span>
          <span class="overlay-hint">{{ 'addSticker.zoomHint' | translate }}</span>
        } @else {
          <span>{{ 'addSticker.locationOnMap' | translate }}</span>
        }
      </mat-toolbar>
      <app-map
        [locationSelectionMode]="locationSelectionMode()"
        [selectionStartLocation]="lastKnownLocation()"
        [isAuthenticated]="authService.isAuthenticated()"
        [isViewer]="authService.isViewer()"
        [isUploader]="authService.isUploader()"
        [isEditor]="authService.isEditor()"
        [isAdmin]="authService.isAdmin()"
        (locationSelected)="onLocationSelected($event)"
      ></app-map>

      @if (previewOnlyMode() && lastKnownLocation(); as loc) {
        <div class="preview-panel">
          <span class="preview-coords">
            {{ loc.lat.toFixed(6) }}, {{ loc.lon.toFixed(6) }}
          </span>
          <button mat-flat-button color="accent" (click)="onClosePreview()">
            {{ 'addSticker.backToForm' | translate }}
          </button>
        </div>
      }
    </div>
  </div>
</div>
