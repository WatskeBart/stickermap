<h2 mat-dialog-title>{{ 'bulkDelete.title' | translate }}</h2>
<mat-dialog-content>
  <p [innerHTML]="'bulkDelete.body' | translate: { count: data.count }"></p>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">{{ 'common.cancel' | translate }}</button>
  <button mat-flat-button color="warn" (click)="confirm()">
    {{ 'bulkDelete.confirm' | translate: { count: data.count } }}
  </button>
</mat-dialog-actions>
